aid: june
name: June
description: >
  June is a product analytics platform purpose-built for B2B SaaS companies,
  providing company-level and user-level analytics focused on key SaaS metrics
  such as activation, retention, and feature adoption. The platform offers a
  REST-based Tracking API compatible with the Segment protocol, enabling teams
  to identify users, track events, group users into companies, and record page
  views. June also provides server-side SDKs for Node.js, Python, and Ruby, as
  well as client-side JavaScript and React/Next.js libraries. An Embed API
  (available as a Pro Plan add-on) allows embedding June dashboards directly
  into customer-facing products, and a Data Deletions API supports GDPR
  compliance by enabling deletion of user and workspace data.
type: Index
