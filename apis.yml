apis:
  - aid: june:tracking-api
    name: June Tracking API
    description: >
      REST API for sending user behaviour data to June, including user
      identification, event tracking, company grouping, and page view
      recording. Uses Basic Authentication with a workspace write key.
      The API base is https://api.june.so/sdk/ and is compatible with
      the Segment tracking protocol.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.june.so/docs/tracking/http-api/authentication
    baseURL: https://api.june.so/sdk
    tags:
      - Event Tracking
      - Identify
      - Group
      - Page Views
    properties:
      - type: Documentation
        url: https://www.june.so/docs/tracking/http-api/authentication
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/june/refs/heads/main/openapi/june-tracking-api-openapi.yml
  - aid: june:embed-api
    name: June Embed API
    description: >
      Pro Plan add-on API that allows embedding June analytics dashboards
      directly into customer-facing products, enabling teams to surface
      product metrics for individual accounts within their own applications.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://help.june.so/en/articles/9832226-api-documentation
    baseURL: https://api.june.so
    tags:
      - Embed
      - Dashboards
      - White Label
    properties:
      - type: Documentation
        url: https://help.june.so/en/articles/9832226-api-documentation
  - aid: june:data-deletions-api
    name: June Data Deletions API
    description: >
      API for managing data within the June platform, including the ability
      to delete users and workspaces to support GDPR and privacy compliance
      requirements.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://help.june.so/en/articles/9832226-api-documentation
    baseURL: https://api.june.so
    tags:
